name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS app
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build app bundle
        run: npm run tauri:bundle:mac

      - name: Package app bundle
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p release
          ditto -c -k --sequesterRsrc --keepParent \
            "src-tauri/target/release/bundle/macos/SDVX B50 Tool.app" \
            "release/SDVX-B50-Tool-macOS-v${VERSION}.zip"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: SDVX-B50-Tool-macOS
          path: release/SDVX-B50-Tool-macOS-*.zip
          if-no-files-found: error

  build-windows:
    name: Build Windows exe
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build executable
        run: npm run tauri:build:portable

      - name: Package executable
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^v', ''
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item `
            src-tauri\target\release\sdvx-b50-tool.exe `
            release\sdvx-b50-tool-v$version.exe

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: SDVX-B50-Tool-Windows
          path: release/sdvx-b50-tool-v*.exe
          if-no-files-found: error

  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-windows
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create release and upload artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" release-artifacts/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG_NAME" \
            --generate-notes
